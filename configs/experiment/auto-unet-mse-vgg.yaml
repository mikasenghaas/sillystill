# @package _global_

# To run: `python train.py -m experiment={filename}`

defaults:
  - override /data: combined
  - override /model: auto-translation
  - override /model/net: auto-translate
  - override /model/loss: auto-translate
  - override /logger: wandb

group: auto-unet-mse-vgg
tags: ["auto-translate", "unet", "mse-vgg"]
seed: 42

trainer:
  min_epochs: 1
  max_epochs: 10
  accumulate_grad_batches: 8
  val_check_interval: 0.25

model:
  optimizer:
    lr: 3e-4

data:
  num_paired_per_batch: 1
  num_unpaired_per_batch: 1