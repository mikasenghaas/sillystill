# @package _global_

# To run: `python train.py -m experiment={filename}`

defaults:
  - override /data: paired
  - override /model: translation
  - override /model/net: unet
  - override /model/loss: simple-combined
  - override /logger: wandb

group: unet-combined-augment
tags: ["unet", "combined", "augment"]
seed: 42

trainer:
  min_epochs: 10
  max_epochs: 150
  accumulate_grad_batches: 8

model:
  optimizer:
    lr: 1e-3 # From unet-combined
    weight_decay: 1e-3
  scheduler:
    factor: 1e-1
    patience: 5
  net:
    hidden_channels: [64,128,256] # From unet-combined
  loss:
    mse_weight: 0.5 # From unet-combined
  patch_size: 128 # From unet-combined

data:
  batch_size: 1
  data_split: [0.7, 0.2, 0.1]

hydra:
  sweeper:
    params:
      model.augment: 0, 0.25, 0.5, 0.75, 1