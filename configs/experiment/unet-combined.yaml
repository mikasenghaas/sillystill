# @package _global_

# To run: `python train.py -m experiment={filename}`

defaults:
  - override /data: paired
  - override /model: translation
  - override /model/net: unet
  - override /model/loss: simple-combined
  - override /logger: wandb

group: unet-combined
tags: ["unet", "combined"]
seed: 42

hydra:
  sweeper:
    params:
      model.optimizer.lr: 1e-4, 1e-3
      model.net.hidden_channels: "choice([64,128], [64, 128, 256])"
      model.training_patch_size: 128, 256
      model.loss.mse_weight: 0.5, 1.0