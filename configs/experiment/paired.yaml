# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /data: paired
  - override /model: translation
  - override /logger: wandb

group: translation
tags: ["translation"]
seed: 42

trainer:
  min_epochs: 10
  max_epochs: 50

model:
  optimizer:
    lr: 0.0001
    weight_decay: 0.001
  scheduler:
    factor: 0.1
    patience: 5
  net:
    features: [16, 32, 64]

data:
  batch_size: 8
  train_val_test_split: [0.7, 0.2, 0.1]

hydra:
  sweeper:
    params:
      model.optimizer.lr: 1e-3, 1e-4,1e-5