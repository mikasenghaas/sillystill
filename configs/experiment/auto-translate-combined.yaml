# @package _global_

# To run: `python train.py -m experiment={filename}`

defaults:
  - override /data: combined
  - override /model: auto-translation
  - override /model/net: auto-translate
  - override /model/loss: auto-translate
  - override /logger: wandb

group: auto-translate-combined
tags: ["auto-translate", "combined"]
seed: 42

trainer:
  min_epochs: 10
  max_epochs: 100
  accumulate_grad_batches: 8

model:
  optimizer:
    lr: 1e-4

data:
  num_paired_per_batch: 4
  num_unpaired_per_batch: 6

