# @package _global_

# To run: `python train.py -m experiment={filename}`

defaults:
  - override /data: paired
  - override /model: translation
  - override /model/net: unet
  - override /model/loss: mse
  - override /logger: wandb

group: unet-mse
tags: ["mse", "unet"]
seed: 42

trainer:
  min_epochs: 10
  max_epochs: 100
  accumulate_grad_batches: 8

model:
  optimizer:
    lr: 1e-4
    weight_decay: 1e-3
  scheduler:
    factor: 1e-1
    patience: 5
  net:
    hidden_channels: [32, 64, 128, 256]
  augment: 0.0

data:
  batch_size: 1
  data_split: [0.7, 0.2, 0.1]

hydra:
  sweeper:
    params:
      model.optimizer.lr: 1e-4, 1e-3
      model.net.hidden_channels: "choice([64, 128], [64, 128, 256])"
      model.training_patch_size: 128, 256