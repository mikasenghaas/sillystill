# @package _global_

# To run: `python train.py -m experiment=translation`

defaults:
  - override /data: paired
  - override /model: translation
  - override /logger: wandb

group: translation-patch
tags: ["translation", "unet", "v3"]
seed: 42

trainer:
  min_epochs: 10
  max_epochs: 100

model:
  optimizer:
    lr: 1e-4
    weight_decay: 1e-3
  scheduler:
    factor: 1e-1
    patience: 5
  net:
    start_dim: 64
    num_layers: 4

data:
  batch_size: 1
  train_val_test_split: [0.7, 0.2, 0.1]

hydra:
  sweeper:
    params:
      data.dataset.patch_size: 32, 64, 128
      model/loss_fn: cobi, mse