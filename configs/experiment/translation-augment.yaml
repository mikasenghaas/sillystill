# @package _global_

# To run: `python train.py -m experiment=translation`

defaults:
  - override /data: paired
  - override /model: translation
  - override /logger: wandb

group: translation-augment
tags: ["translation", "unet", "mse", "v1"]
seed: 42

trainer:
  min_epochs: 10
  max_epochs: 50

model:
  optimizer:
    lr: 1e-4
    weight_decay: 1e-3
  scheduler:
    factor: 1e-1
    patience: 5
  net:
    start_dim: 64
    num_layers: 4

data:
  batch_size: 8
  train_val_test_split: [0.7, 0.2, 0.1]

  dataset:
    patch_size: 256

hydra:
  sweeper:
    params:
      data.dataset.augment.flip: False, True
      data.dataset.augment.rotate: False, True
      data.dataset.augment.blur: False, True
      data.dataset.augment.brightness: False, True
