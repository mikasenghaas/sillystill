# @package _global_

# To run: `python train.py -m experiment=translation`-loss

defaults:
  - override /data: paired
  - override /model: translation
  - override /logger: wandb

group: translation-overfit
tags: ["overfit"]
seed: 42

test: false

trainer:
  min_epochs: 10
  max_epochs: 100

  overfit_batches: 1 # Uses only this fraction/ num_samples per batch for training
  limit_val_batches: 0.0 # Disable validation with 0.0
  num_sanity_val_steps: 0.0 # Disable validation sanity checks with 0.0
  
callbacks:
  model_checkpoint: null
  early_stopping:
    monitor: "train/loss"

model:
  optimizer:
    lr: 1e-4
    weight_decay: 1e-3
  scheduler: null

data:
  train_val_test_split: [0.7, 0.2, 0.1]

  dataset:
    patch_size: 128

    augment:
      flip: False
      rotate: False
      blur: False
      brightness: False

hydra:
  sweeper:
    params:
      model.optimizer.lr: 1e-4, 1e-3
      model/net: conv, unet
      model/loss: mse, simple-combined